<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ICQA Quality Portals icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0053e2"/>
      <stop offset="100%" stop-color="#001a6e"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="128" height="128" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <g clip-path="url(#shape)">
    <rect x="26" y="36" width="76" height="84" rx="10"
          fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="3.5"/>
    <!-- Clip tab at top -->
    <rect x="46" y="27" width="36" height="18" rx="9"
          fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>
    <!-- Ruled lines -->
    <line x1="40" y1="72" x2="88" y2="72" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="85" x2="88" y2="85" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="98" x2="68" y2="98" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- QP — Walmart spark yellow, bold -->
  <text x="64" y="84"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="55"
        font-weight="900"
        text-anchor="middle"
        fill="#ffc220"
        letter-spacing="-3">QP</text>
</svg>
