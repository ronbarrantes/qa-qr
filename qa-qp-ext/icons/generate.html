<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Icon Generator — ICQA Quality Portals</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0f1a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 32px;
    }
    h1  { font-size: 1.1rem; font-weight: 700; color: #60a5fa; margin: 0; }
    p   { margin: 0; font-size: 0.85rem; color: #9aa4b2; text-align: center; }
    code { background: #1e293b; padding: 1px 5px; border-radius: 4px; font-size: 0.82rem; }
    .previews {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    canvas {
      border-radius: 6px;
      image-rendering: pixelated;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .size-label { font-size: 0.75rem; color: #9aa4b2; }
    .dl-btn {
      padding: 5px 12px;
      background: #1e3a8a;
      color: #bfdbfe;
      border: 1px solid #2563eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .dl-btn:hover { background: #2563eb; color: #fff; }
    #dl-all {
      padding: 10px 28px;
      background: #0053e2;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
    }
    #dl-all:hover { background: #1d4ed8; }
    #status { font-size: 0.82rem; color: #34d399; min-height: 1em; }
  </style>
</head>
<body>
  <h1>🏷 ICQA Quality Portals — Icon Generator</h1>
  <p>Open this file in Chrome, hit Download All, then move the<br/>
     four PNGs into your <code>icons/</code> folder and reload the extension.</p>

  <div class="previews" id="previews"></div>
  <p id="status"></p>
  <button id="dl-all">⬇ Download All 4 PNGs</button>

  <script>
    // SVG embedded directly — no fetch() needed, works on file://
    // Walmart blue gradient bg + clipboard silhouette + "QP" in spark yellow
    const SVG_SRC = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ICQA Quality Portals icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0053e2"/>
      <stop offset="100%" stop-color="#001a6e"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="128" height="128" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Clipboard body — subtle, fades out at tiny sizes gracefully -->
  <g clip-path="url(#shape)">
    <rect x="26" y="36" width="76" height="84" rx="10"
          fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="3.5"/>
    <!-- Clip tab at top -->
    <rect x="46" y="27" width="36" height="18" rx="9"
          fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>
    <!-- Ruled lines (document feel) -->
    <line x1="40" y1="72" x2="88" y2="72" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="85" x2="88" y2="85" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="98" x2="68" y2="98" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- QP — Walmart spark yellow, bold, readable down to 16px -->
  <text x="64" y="84"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="55"
        font-weight="900"
        text-anchor="middle"
        fill="#ffc220"
        letter-spacing="-3">QP</text>
</svg>`;

    const SIZES    = [16, 32, 48, 128];
    const canvases = {};

    function svgToImage(size) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([SVG_SRC], { type: "image/svg+xml" });
        const url  = URL.createObjectURL(blob);
        const img  = new Image(size, size);
        img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = reject;
        img.src = url;
      });
    }

    async function renderCanvas(size) {
      const canvas  = document.createElement("canvas");
      canvas.width  = size;
      canvas.height = size;
      const img = await svgToImage(size);
      canvas.getContext("2d").drawImage(img, 0, 0, size, size);
      return canvas;
    }

    function download(canvas, filename) {
      const a    = document.createElement("a");
      a.download = filename;
      a.href     = canvas.toDataURL("image/png");
      a.click();
    }

    async function init() {
      const container = document.getElementById("previews");

      for (const size of SIZES) {
        const canvas   = await renderCanvas(size);
        canvases[size] = canvas;

        // Display enlarged so tiny ones are actually visible
        const display        = Math.max(size, 64);
        canvas.style.width   = display + "px";
        canvas.style.height  = display + "px";

        const label       = document.createElement("span");
        label.className   = "size-label";
        label.textContent = `${size} × ${size}`;

        const btn       = document.createElement("button");
        btn.className   = "dl-btn";
        btn.textContent = "Download";
        btn.onclick     = () => download(canvas, `icon${size}.png`);

        const item      = document.createElement("div");
        item.className  = "preview-item";
        item.append(canvas, label, btn);
        container.append(item);
      }

      document.getElementById("dl-all").onclick = () => {
        SIZES.forEach(s => download(canvases[s], `icon${s}.png`));
        document.getElementById("status").textContent =
          "✓ Done! Move the 4 PNGs into your icons/ folder and reload the extension.";
      };
    }

    init().catch(err => {
      document.getElementById("status").textContent = "❌ " + err.message;
    });
  </script>
</body>
</html>
